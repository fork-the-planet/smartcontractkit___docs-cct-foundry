[profile.default]
src = "src"
out = "out"
libs = ["node_modules"]
solc_version = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 200

remappings = [
  "forge-std/=node_modules/@chainlink/contracts/src/v0.8/vendor/forge-std/src/",
  "@chainlink/contracts-ccip/contracts/=node_modules/@chainlink/contracts-ccip/contracts/",
  "@chainlink/contracts@1.4.0/=node_modules/@chainlink/contracts/",
  "@chainlink/contracts/=node_modules/@chainlink/contracts/",
  "@chainlink/policy-management/=node_modules/@chainlink/ace/packages/policy-management/src/",
  "@openzeppelin/contracts@4.8.3/=node_modules/@openzeppelin/contracts-4.8.3/",
  "@openzeppelin/contracts@5.3.0/=node_modules/@openzeppelin/contracts-5.3.0/",
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts-5.3.0/"
]

fs_permissions = [{ access = "read-write", path = "./" }]

[lint]
exclude_lints = [
  "mixed-case-variable",
  "pascal-case-struct",
  "mixed-case-function",
  "screaming-snake-case-const",
  "screaming-snake-case-immutable",
  "unsafe-cheatcode",
  "unsafe-typecast"
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
